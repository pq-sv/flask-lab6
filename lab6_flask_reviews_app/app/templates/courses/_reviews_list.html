{% macro render_reviews_list(reviews) %}
    {% if reviews %}
        {% for review in reviews %}
            <div class="card mb-3 review-card">
                <div class="card-header d-flex flex-column flex-md-row gap-2 align-items-md-center">
                    <strong>{{ review.user.full_name }}</strong>
                    <span class="ms-md-auto text-muted">{{ review.created_at.strftime('%d.%m.%Y %H:%M:%S') }}</span>
                </div>
                <div class="card-body">
                    <div class="mb-2 rating"><strong>Оценка:</strong> {{ review.rating }} / 5</div>
                    <p class="card-text mb-0">{{ review.text }}</p>
                </div>
            </div>
        {% endfor %}
    {% else %}
        <div class="alert alert-secondary">Отзывов пока нет.</div>
    {% endif %}
{% endmacro %}
